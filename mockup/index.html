  :root{
    --bg:#f4f6f9; --surface:#ffffff; --surface-2:#eef1f6; --border:#e2e6ee;
    --text:#1c2333; --text-dim:#5c6478; --text-faint:#8a90a3;
    --accent:#3454d1; --accent-2:#7c5cff; --accent-soft:#e8ecff;
    --good:#1c9d6b; --good-soft:#e3f7ee;
    --warn:#c98a1a; --warn-soft:#fbf0dd;
    --bad:#d64545; --bad-soft:#fce8e8;
    --factory:#b5651d; --factory-soft:#fbe9d9; --factory-accent:#d97b2b;
    --shadow: 0 1px 2px rgba(20,25,40,.04), 0 4px 16px rgba(20,25,40,.06);
    --radius: 12px;
  }
  :root[data-theme="dark"]{
    --bg:#12141c; --surface:#1b1f2a; --surface-2:#232838; --border:#2c3244;
    --text:#e7e9f0; --text-dim:#a7acc0; --text-faint:#6d7285;
    --accent:#7c93ff; --accent-2:#a78bfa; --accent-soft:#232a4a;
    --good:#4ad393; --good-soft:#123328;
    --warn:#e3ab4e; --warn-soft:#3a2c10;
    --bad:#f07272; --bad-soft:#3a1a1a;
    --factory:#e3924e; --factory-soft:#3a2716; --factory-accent:#e3924e;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#12141c; --surface:#1b1f2a; --surface-2:#232838; --border:#2c3244;
      --text:#e7e9f0; --text-dim:#a7acc0; --text-faint:#6d7285;
      --accent:#7c93ff; --accent-2:#a78bfa; --accent-soft:#232a4a;
      --good:#4ad393; --good-soft:#123328;
      --warn:#e3ab4e; --warn-soft:#3a2c10;
      --bad:#f07272; --bad-soft:#3a1a1a;
      --factory:#e3924e; --factory-soft:#3a2716; --factory-accent:#e3924e;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  body{margin:0;padding:0;overflow-x:hidden}
  html,body{max-width:100%}
  body{
    font-family: "Segoe UI", system-ui, -apple-system, "Inter", Roboto, sans-serif;
    background:var(--bg); color:var(--text);
    display:flex; min-height:100vh;
  }
  a{color:inherit;text-decoration:none}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:230px; flex:0 0 230px; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; height:100vh; position:sticky; top:0;
  }
  .brand{
    display:flex; align-items:center; gap:10px; padding:18px 18px 14px;
    border-bottom:1px solid var(--border);
  }
  .brand .mark{
    width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex:0 0 auto;
  }
  .brand .name{font-weight:700; font-size:15px; letter-spacing:.2px}
  .brand .sub{font-size:11px;color:var(--text-faint)}

  .mode-switch{
    display:flex; margin:14px 14px 6px; background:var(--surface-2); border-radius:10px; padding:3px; gap:3px;
  }
  .mode-switch button{
    flex:1; border:0; background:transparent; padding:8px 6px; border-radius:8px; font-size:12.5px; font-weight:600;
    color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .mode-switch button.active.home-active{background:var(--surface); color:var(--accent); box-shadow:var(--shadow)}
  .mode-switch button.active.factory-active{background:var(--surface); color:var(--factory-accent); box-shadow:var(--shadow)}

  .nav{flex:1; overflow-y:auto; padding:10px 12px}
  .nav .group-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint);
    padding:14px 10px 6px;
  }
  .nav a{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
    font-size:13.5px; color:var(--text-dim); font-weight:500; margin-bottom:2px; cursor:pointer;
  }
  .nav a:hover{background:var(--surface-2); color:var(--text)}
  .nav a.active{background:var(--accent-soft); color:var(--accent); font-weight:700}
  body.factory-mode .nav a.active{color:var(--factory-accent)}
  .nav a .ic{width:18px; text-align:center; font-size:14px}

  .sidebar-footer{
    padding:12px 18px; border-top:1px solid var(--border); font-size:11px; color:var(--text-faint);
    display:flex; align-items:center; justify-content:space-between;
  }
  .theme-toggle{
    border:1px solid var(--border); background:var(--surface-2); border-radius:7px; padding:5px 8px;
    cursor:pointer; font-size:12px; color:var(--text-dim);
  }

  /* ---------- Main ---------- */
  .main{flex:1; min-width:0; display:flex; flex-direction:column}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:16px 28px;
    border-bottom:1px solid var(--border); background:var(--surface);
    position:sticky; top:0; z-index:5;
  }
  .topbar h1{font-size:18px; margin:0; font-weight:700}
  .topbar .crumb{font-size:12px; color:var(--text-faint); margin-top:2px}
  .topbar-right{display:flex; align-items:center; gap:12px}
  .avatar{
    width:34px;height:34px;border-radius:50%;background:var(--surface-2); color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px; border:1px solid var(--border);
  }
  .btn{
    border:0; padding:9px 15px; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn-primary{background:var(--accent); color:#fff}
  body.factory-mode .btn-primary{background:var(--factory-accent)}
  .btn-ghost{background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border)}

  .content{padding:24px 28px 60px; overflow-y:auto}
  .page{display:none}
  .page.active{display:block; animation:fade .18s ease}
  @keyframes fade{from{opacity:0; transform:translateY(3px)} to{opacity:1; transform:none}}

  /* KPI cards */
  .kpi-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:22px}
  .kpi{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px;
    box-shadow:var(--shadow);
  }
  .kpi .lbl{font-size:12px; color:var(--text-faint); font-weight:600; margin-bottom:8px}
  .kpi .val{font-size:22px; font-weight:700}
  .kpi .delta{font-size:11.5px; margin-top:6px; font-weight:600}
  .delta.up{color:var(--good)} .delta.down{color:var(--bad)} .delta.flat{color:var(--text-faint)}

  /* Panels / cards */
  .panel{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); margin-bottom:20px;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border);
  }
  .panel-head h3{margin:0; font-size:14.5px; font-weight:700}
  .panel-body{padding:16px 18px}
  .two-col{display:grid; grid-template-columns:1.3fr .9fr; gap:18px}
  @media(max-width:980px){.two-col{grid-template-columns:1fr}}

  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint);
    padding:8px 10px; border-bottom:1px solid var(--border); font-weight:700;
  }
  tbody td{padding:11px 10px; border-bottom:1px solid var(--border); color:var(--text)}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--surface-2)}
  .num{text-align:right; font-variant-numeric:tabular-nums}

  .tag{display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700}
  .tag.good{background:var(--good-soft); color:var(--good)}
  .tag.warn{background:var(--warn-soft); color:var(--warn)}
  .tag.bad{background:var(--bad-soft); color:var(--bad)}
  .tag.neutral{background:var(--surface-2); color:var(--text-dim)}

  .toolbar{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap}
  .search{
    flex:1; min-width:180px; padding:9px 12px; border-radius:9px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-size:13px;
  }
  select, input[type=text], input[type=number], input[type=date]{
    padding:9px 11px; border-radius:9px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px;
  }
  .chip-row{display:flex; gap:8px; flex-wrap:wrap}
  .chip{padding:6px 12px; border-radius:20px; background:var(--surface-2); border:1px solid var(--border); font-size:12px; font-weight:600; color:var(--text-dim); cursor:pointer}
  .chip.active{background:var(--accent-soft); color:var(--accent); border-color:transparent}
  body.factory-mode .chip.active{background:var(--factory-soft); color:var(--factory-accent)}

  .empty-hint{color:var(--text-faint); font-size:12.5px; padding:20px; text-align:center}

  /* Quick add form */
  .quick-form{display:grid; grid-template-columns:repeat(6,1fr); gap:10px; align-items:end}
  .quick-form .field{display:flex; flex-direction:column; gap:5px}
  .quick-form label{font-size:11px; color:var(--text-faint); font-weight:600}
  .quick-form .field.wide{grid-column:span 2}
  @media(max-width:900px){.quick-form{grid-template-columns:repeat(2,1fr)}.quick-form .field.wide{grid-column:span 2}}

  .progress{height:7px; border-radius:5px; background:var(--surface-2); overflow:hidden}
  .progress > div{height:100%; background:var(--accent)}
  body.factory-mode .progress > div{background:var(--factory-accent)}

  .avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--accent-soft); color:var(--accent); display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700; margin-right:8px}
  body.factory-mode .avatar-sm{background:var(--factory-soft); color:var(--factory-accent)}

  .att-grid{display:grid; grid-template-columns:180px repeat(7,1fr); gap:0; font-size:12.5px}
  .att-grid .h{font-weight:700; font-size:11px; color:var(--text-faint); text-align:center; padding:8px 4px; text-transform:uppercase}
  .att-cell{display:flex;align-items:center;justify-content:center;padding:8px 4px; border-bottom:1px solid var(--border)}
  .att-name{display:flex;align-items:center; padding:8px 4px; border-bottom:1px solid var(--border); font-weight:600}
  .dot{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700; cursor:pointer}
  .dot.P{background:var(--good-soft); color:var(--good)}
  .dot.A{background:var(--bad-soft); color:var(--bad)}
  .dot.H{background:var(--warn-soft); color:var(--warn)}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:5px}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(10,12,20,.45); display:none; align-items:center; justify-content:center; z-index:50;
  }
  .modal-backdrop.show{display:flex}
  .modal{
    background:var(--surface); border-radius:14px; width:420px; max-width:92vw; padding:20px; box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .modal h3{margin:0 0 14px}
  .modal .field{display:flex; flex-direction:column; gap:5px; margin-bottom:12px}
  .modal .field label{font-size:12px; color:var(--text-faint); font-weight:600}
  .modal .field input, .modal .field select{width:100%}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:6px}

  .footnote{font-size:11px; color:var(--text-faint); text-align:center; margin-top:30px}
</style>
</head>

<div class="sidebar">

<div class="main">

    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-backdrop" id="modal-backdrop">

    <h3 id="modal-title">Add item</h3>
    <div id="modal-body"></div>

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>

</div>

let mode = 'home';
let currentPage = 'home-dashboard';

/* ================= RENDER NAV ================= */
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV[mode].map(g => `
    <div class="group-label">${g.group}</div>
    ${g.items.map(it => `<a data-page="${it.id}" class="${it.id===currentPage?'active':''}" onclick="goPage('${it.id}')">
        <span class="ic">${it.icon}</span><span>${it.label}</span>
      </a>`).join('')}
  `).join('');
}

function setMode(m){
  mode = m;
  document.body.classList.toggle('factory-mode', m==='factory');
  document.getElementById('btn-home-mode').classList.toggle('active', m==='home');
  document.getElementById('btn-factory-mode').classList.toggle('active', m==='factory');
  currentPage = m === 'home' ? 'home-dashboard' : 'factory-dashboard';
  renderNav();
  renderPage(currentPage);
}

function goPage(id){
  currentPage = id;
  renderNav();
  renderPage(id);
}

/* ================= PAGE BUILDERS ================= */
function kpiCard(lbl, val, delta, deltaClass){
  return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val">${val}</div>
    ${delta ? `<div class="delta ${deltaClass}">${delta}</div>` : ''}</div>`;
}

function table(columns, rows){
  return `<table><thead><tr>${columns.map(c=>`<th${c.num?' class="num"':''}>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function renderPage(id){
  const meta = PAGE_META[id];
  document.getElementById('page-title').textContent = meta.title;
  document.getElementById('page-crumb').textContent = meta.crumb;
  const addBtn = document.getElementById('topbar-primary-btn');
  const expBtn = document.getElementById('topbar-secondary-btn');
  if(meta.addLabel){
    addBtn.style.display='inline-flex'; addBtn.textContent = meta.addLabel;
    addBtn.onclick = ()=>openModal(meta.addLabel.replace('+ ',''));
    expBtn.style.display='inline-flex';
  } else {
    addBtn.style.display='none'; expBtn.style.display='none';
  }

  const c = document.getElementById('content');
  c.innerHTML = BUILDERS[id]();
}

/* ================= INTERACTIONS ================= */
function addExpenseDemo(){
  const tbody = document.getElementById('expense-tbody');
  const row = document.createElement('tr');
  row.innerHTML = `<td>${fmtDate('2026-07-20')}</td><td>Other</td><td>New quick-added expense (demo)</td><td>UPI</td><td class="num">${inr(250)}</td>`;
  tbody.prepend(row);
}

function openModal(title){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>Name / Title</label><input type="text" placeholder="Enter details"></div>
    <div class="field"><label>Amount / Value</label><input type="number" placeholder="₹ 0"></div>
    <div class="field"><label>Date</label><input type="date" value="2026-07-20"></div>
    <div style="font-size:11.5px;color:var(--text-faint)">This is a static mockup — form fields are for layout preview only.</div>
  `;
  document.getElementById('modal-backdrop').classList.add('show');
}
function closeModal(){ document.getElementById('modal-backdrop').classList.remove('show'); }

function toggleTheme(){
  const root = document.documentElement;
  const cur = root.getAttribute('data-theme');
  if(cur === 'dark'){ root.setAttribute('data-theme','light'); }
  else if(cur === 'light'){ root.setAttribute('data-theme','dark'); }
  else {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.setAttribute('data-theme', prefersDark ? 'light' : 'dark');
  }
}
