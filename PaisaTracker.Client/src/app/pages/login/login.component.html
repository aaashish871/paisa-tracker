<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <div class="mark">₹</div>
      <div>
        <div class="name">Paisa Tracker</div>
        <div class="sub">personal + factory ops</div>
      </div>
    </div>

    <h1>Sign in</h1>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="username" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" autocomplete="current-password">
      </div>

      @if (error) {
        <div class="error">{{ error }}</div>
      }

      <button class="btn btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
